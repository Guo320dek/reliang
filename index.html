<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>热量教练</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a2e;--surface:#16213e;--surface-light:#1f3460;--text:#e8e8e8;--text-dim:#a0a0b8;--accent:#ff6b6b;--accent-green:#4CAF50;--accent-orange:#FF9800;--accent-red:#D32F2F;--border:#2a3a5c;--radius:14px;--shadow:0 4px 24px rgba(0,0,0,.3)}
body.theme-nailong{--bg:#FFF8E1;--surface:#FFF;--surface-light:#FFF3E0;--text:#4E342E;--text-dim:#8D6E63;--accent:#FF7043;--accent-green:#66BB6A;--accent-orange:#FFA726;--accent-red:#E64A19;--border:#FFE0B2;--shadow:0 4px 24px rgba(139,90,43,.08)}
body.theme-nailong #result-cumulative,body.theme-nailong #result-exercise{background:#FFF8E1}
body.theme-nailong #result-substitutes{background:rgba(102,187,106,.08);border-color:rgba(102,187,106,.2)}
body.theme-nailong .sub-item{border-bottom-color:rgba(139,90,43,.08)}
body.theme-nailong .history-item{border-top-color:#FFE0B2}
body.theme-nailong #result-quote{border-top-color:#FFE0B2}
body.theme-nailong .death-log-item{border-bottom-color:#FFE0B2}
body.theme-nailong #death-card{border-color:var(--accent-red)}
body.theme-nailong #death-dismiss-btn:hover{color:#fff}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
#app{max-width:480px;margin:0 auto;padding:12px 16px 80px}
.hidden{display:none!important}
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:12px;gap:8px}
#pet-selector{display:flex;gap:4px}
.pet-type-btn{background:var(--surface);color:var(--text-dim);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.75rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.pet-type-btn.active{background:var(--surface-light);color:var(--text);border-color:var(--accent);font-weight:600}
#right-controls{display:flex;align-items:center;gap:6px}
#personality-select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:.8rem;outline:none;cursor:pointer}
#reset-btn{background:var(--surface);color:var(--text-dim);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:.8rem;cursor:pointer;transition:all .2s}
#reset-btn:hover{background:var(--accent-red);color:#fff;border-color:var(--accent-red)}
#api-key-section{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:16px;text-align:center}
#api-key-section p{font-size:.85rem;color:var(--text-dim);margin-bottom:10px}
#api-key-section a{color:var(--accent)}
#api-key-input{width:100%;padding:10px 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:.85rem;margin-bottom:8px;outline:none}
#api-key-input:focus{border-color:var(--accent)}
#api-key-save-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:.9rem;cursor:pointer}
#pet-area{background:var(--surface);border-radius:var(--radius);padding:100px 16px 20px;margin-bottom:16px;text-align:center;box-shadow:var(--shadow);position:relative}
.pet-type-electric .creature-nailong{display:none}
.pet-type-nailong .creature-electric{display:none}
#pet-avatar{position:fixed;z-index:90;pointer-events:none;left:10%;top:50%;width:90px;height:100px;transition:filter .5s}
.creature-shadow{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:60px;height:12px;background:rgba(0,0,0,.2);border-radius:50%;transition:all .4s;animation:shadow-pulse .8s ease-in-out infinite}
@keyframes shadow-pulse{0%,100%{transform:translateX(-50%) scaleX(1);opacity:.3}50%{transform:translateX(-50%) scaleX(.7);opacity:.15}}
.pet-creature{position:relative;width:100%;height:100%;animation:creature-walk .5s ease-in-out infinite}
.pet-healthy .pet-creature{animation-duration:.4s}
.pet-full .pet-creature{animation-duration:.65s}
.pet-struggle .pet-creature{animation-duration:.8s;animation-name:creature-stumble}
.creature-body{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:64px;height:56px;border-radius:45% 45% 48% 48%/52% 52% 48% 48%;transition:background .5s,transform .3s;z-index:2}
.creature-ear{position:absolute;bottom:56px;width:18px;height:30px;border-radius:50% 50% 10% 10%;transition:background .5s,transform .3s;z-index:1;transform-origin:bottom center}
.creature-ear-l{left:18px;transform:rotate(-15deg)}
.creature-ear-r{right:18px;transform:rotate(15deg)}
.creature-ear::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;border-radius:50% 50% 10% 10%;transition:background .5s}
.creature-eye{position:absolute;top:18px;width:10px;height:12px;background:#1a1a2e;border-radius:50%;z-index:3;transition:all .3s}
.creature-eye-l{left:16px}.creature-eye-r{right:16px}
.creature-eye::after{content:'';position:absolute;top:2px;left:2px;width:4px;height:4px;background:#fff;border-radius:50%;transition:opacity .3s}
.creature-mouth{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:3;transition:all .3s}
.creature-cheek{position:absolute;top:24px;width:14px;height:10px;border-radius:50%;z-index:3;transition:all .3s}
.creature-cheek-l{left:4px}.creature-cheek-r{right:4px}
.creature-arm{position:absolute;bottom:36px;width:12px;height:20px;border-radius:40%;z-index:1;transform-origin:top center;transition:background .5s}
.creature-arm-l{left:2px;animation:arm-swing-l .4s ease-in-out infinite}
.creature-arm-r{right:2px;animation:arm-swing-r .4s ease-in-out infinite}
.pet-healthy .creature-arm-l,.pet-healthy .creature-arm-r{animation-duration:.35s}
.pet-full .creature-arm-l,.pet-full .creature-arm-r{animation-duration:.55s}
.pet-struggle .creature-arm-l,.pet-struggle .creature-arm-r{animation-duration:.7s}
.creature-leg{position:absolute;bottom:8px;width:14px;height:16px;border-radius:35%;z-index:1;transform-origin:top center;transition:background .5s}
.creature-leg-l{left:18px;animation:leg-walk-l .4s ease-in-out infinite}
.creature-leg-r{right:18px;animation:leg-walk-r .4s ease-in-out infinite}
.pet-healthy .creature-leg-l,.pet-healthy .creature-leg-r{animation-duration:.35s}
.pet-full .creature-leg-l,.pet-full .creature-leg-r{animation-duration:.55s}
.pet-struggle .creature-leg-l,.pet-struggle .creature-leg-r{animation-duration:.7s}
.creature-tail{position:absolute;left:6px;bottom:44px;width:8px;height:24px;z-index:0;transform-origin:bottom center;transition:background .5s;animation:tail-wag .6s ease-in-out infinite}
.creature-tail::before{content:'';position:absolute;top:-6px;left:-10px;width:14px;height:20px;border-radius:0 50% 50% 0/0 50% 50% 0;background:inherit;transform:rotate(-30deg)}
.creature-tail::after{content:'';position:absolute;top:-14px;left:-4px;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:14px solid #FFD700;transform:rotate(15deg);transition:border-bottom-color .5s}
.pet-healthy .creature-body{background:linear-gradient(180deg,#FFE082 0%,#FFD54F 60%,#FFC107 100%)}
.pet-healthy .creature-ear{background:#FFD54F}
.pet-healthy .creature-ear::after{background:#1a1a2e}
.pet-healthy .creature-cheek{background:#FF5252;opacity:.8}
.pet-healthy .creature-arm{background:#FFD54F}
.pet-healthy .creature-leg{background:#FFD54F}
.pet-healthy .creature-tail{background:#FFC107}
.pet-healthy .creature-tail::after{border-bottom-color:#FFD700}
.pet-healthy .creature-mouth{width:16px;height:10px;border-bottom:3px solid #1a1a2e;border-radius:0 0 10px 10px}
.pet-healthy{animation:run-x 6s ease-in-out infinite,run-y 4s ease-in-out infinite}
.pet-full .creature-body{background:linear-gradient(180deg,#FFCC80 0%,#FFB74D 60%,#F57C00 100%)}
.pet-full .creature-ear{background:#FFB74D}
.pet-full .creature-ear::after{background:#1a1a2e}
.pet-full .creature-cheek{background:#FF5252;opacity:.5}
.pet-full .creature-arm{background:#FFB74D}
.pet-full .creature-leg{background:#FFB74D}
.pet-full .creature-tail{background:#F57C00}
.pet-full .creature-tail::after{border-bottom-color:#F57C00}
.pet-full .creature-mouth{width:12px;height:0;border-bottom:3px solid #1a1a2e;border-radius:0}
.pet-full .creature-eye{width:8px;height:10px}
.pet-full{animation:run-x 10s ease-in-out infinite,run-y 7s ease-in-out infinite}
.pet-struggle .creature-body{background:linear-gradient(180deg,#FFAB91 0%,#FF8A65 60%,#E64A19 100%)}
.pet-struggle .creature-ear{background:#FF8A65}
.pet-struggle .creature-ear::after{background:#1a1a2e}
.pet-struggle .creature-cheek{background:#EF5350;opacity:.6}
.pet-struggle .creature-arm{background:#FF8A65}
.pet-struggle .creature-leg{background:#FF8A65}
.pet-struggle .creature-tail{background:#E64A19;animation-duration:.3s}
.pet-struggle .creature-tail::after{border-bottom-color:#E64A19}
.pet-struggle .creature-mouth{width:12px;height:10px;border:2px solid #1a1a2e;border-radius:50%;border-top-color:transparent;border-left-color:transparent;transform:translateX(-50%) rotate(15deg)}
.pet-struggle .creature-eye{width:6px;height:10px;border-radius:3px}
.pet-struggle .creature-eye::after{opacity:.3}
.pet-struggle{animation:run-x 14s ease-in-out infinite,stumble-y 3s ease-in-out infinite}
.pet-dying .creature-body{background:linear-gradient(180deg,#EF9A9A 0%,#E57373 60%,#C62828 100%)}
.pet-dying .creature-ear{background:#E57373}
.pet-dying .creature-ear::after{background:#1a1a2e}
.pet-dying .creature-cheek{background:#D32F2F;opacity:.4}
.pet-dying .creature-arm{background:#E57373;animation-duration:.2s!important}
.pet-dying .creature-leg{background:#E57373;animation-duration:.2s!important}
.pet-dying .creature-tail{background:#C62828;animation-duration:.15s}
.pet-dying .creature-tail::after{border-bottom-color:#C62828}
.pet-dying .creature-mouth{width:10px;height:10px;border-radius:50%;background:none;border:3px solid #1a1a2e;border-top-color:transparent;border-right-color:transparent;transform:translateX(-50%) rotate(-30deg)}
.pet-dying .creature-eye{width:3px;height:12px;border-radius:2px;top:16px}
.pet-dying .creature-eye-l{left:18px}.pet-dying .creature-eye-r{right:18px}
.pet-dying .creature-eye::after{opacity:0}
.pet-dying{animation:dying-crawl 5s ease-in-out infinite;filter:brightness(.9)}
.pet-dead .creature-body{background:linear-gradient(180deg,#BDBDBD 0%,#9E9E9E 60%,#616161 100%);transform:translateX(-50%) rotate(85deg);border-radius:45% 45% 40% 48%}
.pet-dead .creature-ear{background:#9E9E9E}
.pet-dead .creature-ear::after{background:#424242}
.pet-dead .creature-cheek{background:#757575;opacity:.3}
.pet-dead .creature-arm{background:#9E9E9E;animation:none!important}
.pet-dead .creature-arm-l{transform:rotate(60deg)}.pet-dead .creature-arm-r{transform:rotate(-50deg)}
.pet-dead .creature-leg{background:#9E9E9E;animation:none!important}
.pet-dead .creature-leg-l{transform:rotate(20deg)}.pet-dead .creature-leg-r{transform:rotate(-15deg)}
.pet-dead .creature-tail{background:#757575;animation:none}
.pet-dead .creature-tail::after{border-bottom-color:#757575}
.pet-dead .creature-mouth{width:14px;height:2px;background:#424242;border-radius:2px;bottom:10px}
.pet-dead .creature-eye{width:2px;height:14px;border-radius:1px;background:#424242}
.pet-dead .creature-eye-l{transform:rotate(35deg);left:18px;top:14px}
.pet-dead .creature-eye-r{transform:rotate(-35deg);right:18px;top:14px}
.pet-dead .creature-eye::after{opacity:0}
.pet-dead .pet-creature{animation:none}
.pet-dead .creature-shadow{opacity:0}
.pet-dead{animation:none;left:50%!important;top:80%!important;transform:translateX(-50%);transition:left .8s ease-out,top .8s ease-out}
/* ---- 奶龙 ---- */
.pet-type-nailong .pet-creature{animation-name:nailong-bounce}
.nailong-body{width:72px!important;height:60px!important;border-radius:50%!important;bottom:10px!important}
.nailong-belly{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:48px;height:34px;border-radius:50%;z-index:1;transition:background .5s}
.nailong-horn{position:absolute;bottom:66px;width:0;height:0;z-index:1;transition:border-bottom-color .5s}
.nailong-horn-l{left:22px;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:16px solid #F9A825;transform:rotate(-10deg)}
.nailong-horn-r{right:22px;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:16px solid #F9A825;transform:rotate(10deg)}
.nailong-eye{width:14px!important;height:16px!important;top:16px!important;border-radius:50%!important}
.nailong-eye-l{left:14px!important}.nailong-eye-r{right:14px!important}
.nailong-eye::after{width:5px!important;height:5px!important;top:3px!important;left:3px!important}
.nailong-mouth{bottom:8px!important}
.nailong-cheek{width:12px!important;height:8px!important;top:26px!important}
.nailong-cheek-l{left:2px!important}.nailong-cheek-r{right:2px!important}
.nailong-arm{width:10px!important;height:14px!important;border-radius:45%!important;bottom:28px!important}
.nailong-leg{width:12px!important;height:12px!important;border-radius:45%!important;bottom:2px!important}
.nailong-tail{position:absolute;right:8px;bottom:24px;width:16px;height:12px;border-radius:50%;z-index:0;transition:background .5s;animation:tail-wag .8s ease-in-out infinite}
.pet-healthy.pet-type-nailong .nailong-body{background:linear-gradient(180deg,#FFF9C4 0%,#FFEE58 60%,#FDD835 100%)}
.pet-healthy.pet-type-nailong .nailong-belly{background:#FFFDE7}
.pet-healthy.pet-type-nailong .nailong-horn{border-bottom-color:#F9A825}
.pet-healthy.pet-type-nailong .nailong-arm{background:#FFEE58}
.pet-healthy.pet-type-nailong .nailong-leg{background:#FFEE58}
.pet-healthy.pet-type-nailong .nailong-tail{background:#FDD835}
.pet-healthy.pet-type-nailong .nailong-cheek{background:#FF8A80;opacity:.7}
.pet-healthy.pet-type-nailong .nailong-mouth{width:16px;height:10px;border-bottom:3px solid #5D4037;border-radius:0 0 10px 10px}
.pet-full.pet-type-nailong .nailong-body{background:linear-gradient(180deg,#FFE082 0%,#FFCA28 60%,#FFB300 100%)}
.pet-full.pet-type-nailong .nailong-belly{background:#FFF8E1}
.pet-full.pet-type-nailong .nailong-horn{border-bottom-color:#F57F17}
.pet-full.pet-type-nailong .nailong-arm{background:#FFCA28}
.pet-full.pet-type-nailong .nailong-leg{background:#FFCA28}
.pet-full.pet-type-nailong .nailong-tail{background:#FFB300}
.pet-full.pet-type-nailong .nailong-cheek{background:#FF8A80;opacity:.5}
.pet-full.pet-type-nailong .nailong-mouth{width:12px;height:0;border-bottom:3px solid #5D4037;border-radius:0}
.pet-struggle.pet-type-nailong .nailong-body{background:linear-gradient(180deg,#FFCC80 0%,#FFA726 60%,#EF6C00 100%)}
.pet-struggle.pet-type-nailong .nailong-belly{background:#FFF3E0}
.pet-struggle.pet-type-nailong .nailong-horn{border-bottom-color:#E65100}
.pet-struggle.pet-type-nailong .nailong-arm{background:#FFA726}
.pet-struggle.pet-type-nailong .nailong-leg{background:#FFA726}
.pet-struggle.pet-type-nailong .nailong-tail{background:#EF6C00}
.pet-struggle.pet-type-nailong .nailong-cheek{background:#EF5350;opacity:.5}
.pet-struggle.pet-type-nailong .nailong-mouth{width:12px;height:10px;border:2px solid #5D4037;border-radius:50%;border-top-color:transparent;border-left-color:transparent;transform:translateX(-50%) rotate(15deg)}
.pet-dying.pet-type-nailong .nailong-body{background:linear-gradient(180deg,#FFAB91 0%,#FF7043 60%,#D84315 100%)}
.pet-dying.pet-type-nailong .nailong-belly{background:#FBE9E7}
.pet-dying.pet-type-nailong .nailong-horn{border-bottom-color:#BF360C}
.pet-dying.pet-type-nailong .nailong-arm{background:#FF7043;animation-duration:.2s!important}
.pet-dying.pet-type-nailong .nailong-leg{background:#FF7043;animation-duration:.2s!important}
.pet-dying.pet-type-nailong .nailong-tail{background:#D84315;animation-duration:.15s}
.pet-dying.pet-type-nailong .nailong-cheek{background:#D32F2F;opacity:.3}
.pet-dying.pet-type-nailong .nailong-mouth{width:10px;height:10px;border-radius:50%;background:none;border:3px solid #5D4037;border-top-color:transparent;border-right-color:transparent;transform:translateX(-50%) rotate(-30deg)}
.pet-dying.pet-type-nailong .nailong-eye{width:3px!important;height:12px!important;border-radius:2px!important}
.pet-dying.pet-type-nailong .nailong-eye::after{opacity:0}
.pet-dead.pet-type-nailong .nailong-body{background:linear-gradient(180deg,#BDBDBD 0%,#9E9E9E 60%,#616161 100%);transform:translateX(-50%) rotate(85deg)!important}
.pet-dead.pet-type-nailong .nailong-belly{background:#E0E0E0}
.pet-dead.pet-type-nailong .nailong-horn{border-bottom-color:#757575}
.pet-dead.pet-type-nailong .nailong-arm{background:#9E9E9E;animation:none!important}
.pet-dead.pet-type-nailong .nailong-leg{background:#9E9E9E;animation:none!important}
.pet-dead.pet-type-nailong .nailong-tail{background:#757575;animation:none}
.pet-dead.pet-type-nailong .nailong-cheek{background:#757575;opacity:.3}
.pet-dead.pet-type-nailong .nailong-mouth{width:14px;height:2px;background:#424242;border-radius:2px;bottom:6px!important}
.pet-dead.pet-type-nailong .nailong-eye{width:2px!important;height:14px!important;border-radius:1px!important;background:#424242!important}
.pet-dead.pet-type-nailong .nailong-eye-l{transform:rotate(35deg);left:16px!important}
.pet-dead.pet-type-nailong .nailong-eye-r{transform:rotate(-35deg);right:16px!important}
.pet-dead.pet-type-nailong .nailong-eye::after{opacity:0}
.pet-dead.pet-type-nailong .pet-creature{animation:none}
@keyframes nailong-bounce{0%,100%{transform:translateY(0) scale(1,1)}30%{transform:translateY(-10px) scale(1.05,.95)}50%{transform:translateY(0) scale(1,1)}70%{transform:translateY(-6px) scale(1.02,.98)}}
@keyframes run-x{0%{left:5%}15%{left:85%}30%{left:30%}45%{left:75%}60%{left:15%}75%{left:60%}90%{left:40%}100%{left:5%}}
@keyframes run-y{0%{top:20%}20%{top:65%}40%{top:35%}60%{top:70%}80%{top:25%}100%{top:20%}}
@keyframes stumble-y{0%{top:30%}25%{top:55%}50%{top:45%}75%{top:60%}100%{top:30%}}
@keyframes dying-crawl{0%{left:20%;top:60%}50%{left:40%;top:65%}100%{left:20%;top:60%}}
@keyframes creature-walk{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
@keyframes creature-stumble{0%{transform:translateY(0) rotate(-4deg)}25%{transform:translateY(-4px) rotate(-1deg)}50%{transform:translateY(2px) rotate(4deg)}75%{transform:translateY(-2px) rotate(1deg)}100%{transform:translateY(0) rotate(-4deg)}}
@keyframes leg-walk-l{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(25deg)}}
@keyframes leg-walk-r{0%,100%{transform:rotate(25deg)}50%{transform:rotate(-20deg)}}
@keyframes arm-swing-l{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-15deg)}}
@keyframes arm-swing-r{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(20deg)}}
@keyframes tail-wag{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(25deg)}}
#pet-status-text{font-size:.95rem;color:var(--text);margin-bottom:12px;min-height:1.5em}
#pet-progress-container{background:var(--bg);border-radius:10px;height:8px;margin-bottom:8px;overflow:hidden}
#pet-progress-bar{height:100%;background:var(--accent-green);border-radius:10px;transition:width .5s ease,background-color .5s ease;min-width:4px}
#pet-progress-label{font-size:.75rem;color:var(--text-dim)}
#pet-gender-toggle{display:flex;gap:8px;justify-content:center;margin-top:12px}
.gender-btn{background:var(--bg);color:var(--text-dim);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.8rem;cursor:pointer;transition:all .2s}
.gender-btn.active{background:var(--surface-light);color:var(--text);border-color:var(--accent)}
#search-area{margin-bottom:16px}
#search-box{display:flex;gap:8px}
#food-input{flex:1;padding:14px 16px;background:var(--surface);color:var(--text);border:2px solid var(--border);border-radius:var(--radius);font-size:1rem;outline:none;transition:border-color .2s}
#food-input:focus{border-color:var(--accent)}
#food-input::placeholder{color:var(--text-dim);font-size:.85rem}
#search-btn{padding:14px 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:1.1rem;cursor:pointer;transition:transform .15s,opacity .15s;white-space:nowrap}
#search-btn:active{transform:scale(.95);opacity:.8}
#loading{text-align:center;padding:40px 0}
